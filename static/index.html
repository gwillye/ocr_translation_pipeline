<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OCR Demo — Tesseract / TrOCR + OpenCV</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --fg:#e2e8f0; --accent:#38bdf8; --muted:#94a3b8; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           background:var(--bg); color:var(--fg); display:flex; justify-content:center; padding:2rem; }
    .wrap { width:100%; max-width:760px; }
    h1 { font-size:1.4rem; margin:0 0 .25rem; }
    p.sub { color:var(--muted); margin:0 0 1.5rem; font-size:.9rem; }
    .card { background:var(--card); border-radius:12px; padding:1.25rem; margin-bottom:1.25rem;
            box-shadow:0 4px 20px rgba(0,0,0,.3); }
    label { display:block; font-size:.8rem; color:var(--muted); margin:.6rem 0 .2rem; }
    select, input[type=text] { width:100%; padding:.5rem; border-radius:8px; border:1px solid #334155;
            background:#0f172a; color:var(--fg); }
    .row { display:flex; gap:1rem; flex-wrap:wrap; }
    .row > div { flex:1; min-width:140px; }
    button { margin-top:1rem; width:100%; padding:.7rem; border:none; border-radius:8px;
             background:var(--accent); color:#06283d; font-weight:600; font-size:1rem; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
    #drop { border:2px dashed #334155; border-radius:10px; padding:1.5rem; text-align:center;
            color:var(--muted); cursor:pointer; }
    #drop.over { border-color:var(--accent); color:var(--accent); }
    #preview { max-width:100%; margin-top:1rem; border-radius:8px; display:none; }
    pre { white-space:pre-wrap; word-break:break-word; background:#0f172a; padding:1rem;
          border-radius:8px; min-height:2.5rem; margin:0; }
    .meta { font-size:.8rem; color:var(--muted); margin-bottom:.5rem; }
    .err { color:#f87171; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>OCR Demo</h1>
    <p class="sub">Tesseract / TrOCR with OpenCV preprocessing — upload an image, get the text.</p>

    <div class="card">
      <div id="drop">Drag &amp; drop an image here, or click to choose</div>
      <input id="file" type="file" accept="image/*" hidden />
      <img id="preview" alt="preview" />

      <div class="row">
        <div>
          <label for="engine">Engine</label>
          <select id="engine">
            <option value="tesseract">Tesseract (fast)</option>
            <option value="trocr">TrOCR base-printed (accurate, slow)</option>
          </select>
        </div>
        <div>
          <label for="preprocess">Preprocess (Tesseract)</label>
          <select id="preprocess">
            <option value="opencv">OpenCV adaptive + deskew</option>
            <option value="pil">PIL global threshold</option>
            <option value="none">None (raw)</option>
          </select>
        </div>
        <div>
          <label for="lang">Tesseract lang</label>
          <input id="lang" type="text" value="eng" />
        </div>
      </div>

      <button id="go" disabled>Run OCR</button>
    </div>

    <div class="card">
      <div class="meta" id="meta">Result</div>
      <pre id="out">—</pre>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file');
    const drop = document.getElementById('drop');
    const preview = document.getElementById('preview');
    const go = document.getElementById('go');
    const out = document.getElementById('out');
    const meta = document.getElementById('meta');
    let chosen = null;

    function setFile(f) {
      if (!f) return;
      chosen = f;
      go.disabled = false;
      const url = URL.createObjectURL(f);
      preview.src = url; preview.style.display = 'block';
      drop.textContent = f.name;
    }

    drop.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => setFile(e.target.files[0]));
    ['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => {
      e.preventDefault(); drop.classList.add('over');
    }));
    ['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => {
      e.preventDefault(); drop.classList.remove('over');
    }));
    drop.addEventListener('drop', e => setFile(e.dataTransfer.files[0]));

    go.addEventListener('click', async () => {
      if (!chosen) return;
      go.disabled = true; out.classList.remove('err');
      out.textContent = 'Running…'; meta.textContent = 'Result';
      const fd = new FormData();
      fd.append('file', chosen);
      fd.append('engine', document.getElementById('engine').value);
      fd.append('preprocess', document.getElementById('preprocess').value);
      fd.append('lang', document.getElementById('lang').value);
      const t0 = performance.now();
      try {
        const res = await fetch('/ocr', { method: 'POST', body: fd });
        const data = await res.json();
        const ms = Math.round(performance.now() - t0);
        if (!res.ok) {
          out.classList.add('err');
          out.textContent = data.detail || ('HTTP ' + res.status);
        } else {
          meta.textContent = `engine=${data.engine} · preprocess=${data.preprocess} · ${ms} ms`;
          out.textContent = data.text || '(no text detected)';
        }
      } catch (err) {
        out.classList.add('err'); out.textContent = String(err);
      } finally {
        go.disabled = false;
      }
    });
  </script>
</body>
</html>
